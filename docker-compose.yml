services:
  database:
    # Usando imagen oficial de PostgreSQL
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"   # Solo si necesitas acceso externo
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persistencia
    networks:
      - app-network   # Opcional, si otros contenedores en la misma máquina

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local