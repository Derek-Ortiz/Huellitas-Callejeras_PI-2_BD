name: Deploy Database

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'             ## Solo si cambia las migraciones
      - 'schema_HC-1.2.sql'         ## O el esquema
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Nota: No hay Dockerfile, se usa imagen oficial de postgres

      # Copiar archivos de configuración a EC2
      - name: Copiar archivos de configuración
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_DATABASE_HOST }}    # IP de la instancia BD
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,migrations/,schema_HC-1.2.sql,init-migrations.sh"
          target: "/home/ubuntu/hc-database"

      # Desplegar en EC2
      - name: Deploy con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}       # Variables de BD
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.EC2_DATABASE_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_TOKEN,DOCKERHUB_USERNAME,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            # Login a Docker Hub
            echo $DOCKERHUB_TOKEN | docker login --username $DOCKERHUB_USERNAME --password-stdin

            cd /home/ubuntu/hc-database

            # Crear archivo .env con las credenciales
            cat > .env << 'ENVFILE'
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=$POSTGRES_DB
            ENVFILE

            echo "=== .env creado ==="
            cat .env

            # Detener contenedores actuales (sin borrar volúmenes)
            docker-compose down || true

            # Limpiar recursos no usados (IMPORTANTE: sin --volumes para no borrar datos)
            docker system prune -af

            # Descargar nueva imagen
            docker-compose pull

            # Levantar la base de datos
            docker-compose up -d

            # Verificar estado
            sleep 5
            docker-compose ps

            # Mostrar logs
            echo "=== Database Logs ==="
            docker-compose logs --tail=50 database