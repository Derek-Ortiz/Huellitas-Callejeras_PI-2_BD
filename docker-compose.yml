services:
  database:
    # Usando imagen oficial de PostgreSQL
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"   # Solo si necesitas acceso externo
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persistencia
      - ./schema_HC-1.2.sql:/docker-entrypoint-initdb.d/01-schema_HC-1.2.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./init-migrations.sh:/docker-entrypoint-initdb.d/02-init-migrations.sh:ro
    networks:
      - app-network   # Opcional, si otros contenedores en la misma máquina

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local