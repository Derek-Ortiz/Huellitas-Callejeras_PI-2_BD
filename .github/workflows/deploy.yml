name: Deploy Database

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'             ## Solo si cambia las migraciones
      - 'schema_HC-1.2.sql'         ## O el esquema
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Nota: No hay Dockerfile, se usa imagen oficial de postgres

      - name: Copiar archivos de configuración
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_DATABASE_HOST }}    # IP de la instancia BD
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,migrations/,docker-entrypoint-init.sql"
          target: "/home/ubuntu/hc-database"

      # Desplegar en EC2
      - name: Deploy con Docker Compose
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}       # Variables de BD
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.EC2_DATABASE_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_TOKEN,DOCKERHUB_USERNAME,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB
          script: |
            cd /home/ubuntu/hc-database

            # Crear archivo .env con las credenciales
            echo "POSTGRES_USER=$POSTGRES_USER" > .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "POSTGRES_DB=$POSTGRES_DB" >> .env

            echo "=== .env creado ==="
            cat .env

            # Detener contenedores actuales (sin borrar volúmenes)
            docker-compose down || true

            # Limpiar recursos no usados (IMPORTANTE: sin --volumes para no borrar datos)
            docker system prune -af

            # Descargar nueva imagen
            docker-compose pull

            # Levantar la base de datos
            docker-compose up -d

            # Esperar a que PostgreSQL esté listo
            sleep 10

            # Verificar si las tablas existen, si no, ejecutar inicialización
            TABLE_COUNT=$(docker-compose exec -T database psql -U $POSTGRES_USER -d $POSTGRES_DB -tc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" 2>/dev/null || echo "0")
            
            if [ "$TABLE_COUNT" -lt 5 ]; then
              echo "⚠️  Tablas no encontradas, ejecutando inicialización..."
              docker-compose exec -T database psql -U $POSTGRES_USER -d $POSTGRES_DB -f /docker-entrypoint-initdb.d/01-init.sql
              
              # Ejecutar migraciones en orden
              for migration_folder in $(ls -d /docker-entrypoint-initdb.d/migrations/*/ 2>/dev/null | sort); do
                migration_name=$(basename "$migration_folder")
                migration_file="$migration_folder/migration.sql"
                if [ -f "$migration_file" ]; then
                  echo "Ejecutando migración: $migration_name..."
                  docker-compose exec -T database psql -U $POSTGRES_USER -d $POSTGRES_DB -f "$migration_file"
                fi
              done
              echo "✓ Inicialización completada"
            else
              echo "✓ Base de datos ya inicializada ($TABLE_COUNT tablas encontradas)"
            fi

            # Verificar estado final
            sleep 5
            docker-compose ps

            # Mostrar logs
            echo "=== Database Logs ==="
            docker-compose logs --tail=50 database